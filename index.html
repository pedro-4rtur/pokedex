<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link rel="stylesheet" href="estilos/style.css">
    <script src="scripts/javascript.js" defer></script>
    <!--<script src="scripts/index.js" defer></script>-->
    <!--<script src="scripts/pesquisa.js" defer></script>-->

    <link rel="shortcut icon" href="imagens/logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

</head>
<body>

    <nav>

        <a href="index.html" id="logo">
            <img src="imagens/logo.png" alt="logo">
        </a>

        <div id="form">

            <div class="container-datalist">
                <input type="text" placeholder="Nome ou Id do pokémon" id="pesquisa" tabindex="0" dir="auto" autocomplete="off">
                <div id="lista">

                </div>
            </div>

            <button id="btnpesquisa" type="button">
                <span class="material-symbols-outlined">
                search
                </span>
            </button>

        </div>

    </nav>

    <div class="card" id="original">

        <a href="" class="links">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="frente">
                        <img src="" alt="pokemon" class="imagens-pokemons">
                    </div>
                    <div class="tras">
                        <div class="container-status">
                            <p>Vida</p>
                            <div class="barra-status barra-vida">
                                <div class="status vida"></div>
                                <span class="qtd-status"></span>
                            </div>
                        </div>
                        <div class="container-status">
                            <p>Ataque</p>
                            <div class="barra-status barra-ataque">
                                <div class="status ataque"></div>
                                <span class="qtd-status"></span>
                            </div>
                        </div>
            
                        <div class="container-status">
                            <p>Defesa</p>
                            <div class="barra-status barra-defesa">
                                <div class="status defesa"></div>
                                <span class="qtd-status span-defesa"></span>
                            </div>
                        </div>
            
                        <div class="container-status">
                            <p>Velocidade</p>
                            <div class="barra-status barra-velocidade">
                                <div class="status velocidade"></div>
                                <span class="qtd-status span-velocidade"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="conteudo-card">
                <p class="numero-pokemon"></p>
                <p class="nome-pokemon"></p>
                <div class="container-tipo">
            
                </div>
            </div>
        </a>

    </div>

    <main>

        <div class="dropdown">
            <div class="dropbtn">
                <button>Ordernar: <span>N° &darr;</span></button>
            </div>
            <div class="drop-content">

                <option value="n-">N° &darr;</option>
                <option value="n+">N° &uarr;</option>
                <option value="a-">A &darr;</option>
                <option value="z+">Z &uarr;</option>
                <option value="1g">1° Geração</option>
                <option value="2g">2° Geração</option>

            </div>
        </div>

        <div class="container">

            

        </div>

    </main>

    <button onclick="topFunction()" id="btntop" title="Go to top">
        <span class="material-symbols-outlined">
        arrow_upward
        </span>
    </button> 
    
</body>
</html>
